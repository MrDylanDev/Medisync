# Medisync SDD Configuration
# Medical appointment management system - Django + Bulma + MySQL

project: medisync
description: Medical appointment management system
stack:
  language: python
  framework: django
  version: "6.0.6"
  css: bulma
  database: mysql
  orm: django-orm

strict_tdd: true

context: |
  Django 6.0.6 project with mysqlclient for MySQL connectivity.
  Uses pytest for testing, ruff for linting/formatting.
  No existing test files or Django apps created yet.

testing:
  runner: pytest
  runner_command: pytest
  framework: pytest
  layers:
    unit: true
    integration: true
    e2e: false
  coverage:
    available: false
    command: "pytest --cov"
  quality:
    linter:
      available: true
      command: ruff check
    type_checker:
      available: false
      command: ""
    formatter:
      available: true
      command: ruff format

phases:
  proposal:
    required: true
    template: "sdd-propose"
  spec:
    required: true
    template: "sdd-spec"
  design:
    required: true
    template: "sdd-design"
  tasks:
    required: true
    template: "sdd-tasks"
  apply:
    required: true
    template: "sdd-apply"
  verify:
    required: true
    template: "sdd-verify"
  archive:
    required: true
    template: "sdd-archive"